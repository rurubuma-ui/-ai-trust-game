<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Trust — Premium подсказки</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
    p { color: #94a3b8; margin-bottom: 1.5rem; max-width: 400px; text-align: center; }
    .btn { display: inline-block; background: #7c3aed; color: white; padding: 0.75rem 1.5rem; border-radius: 8px; text-decoration: none; font-weight: 600; margin: 0.25rem; transition: background .2s; }
    .btn:hover { background: #6d28d9; }
    .btn.secondary { background: #334155; }
    .btn.secondary:hover { background: #475569; }
  </style>
</head>
<body>
  <h1>💡 Premium подсказки</h1>
  <p>5 подсказок за 5 Stars — помогут, когда не уверен в ответе.</p>
  <a class="btn" id="bot-link" href="https://t.me/Arboo34_bot">Открыть в Telegram — /premium</a>
  <a class="btn secondary" href="index.html">Вернуться в игру</a>
  <script>
    (function(){
      const api = window.location.origin;
      fetch(api + '/auth/telegram/config').then(r => r.ok ? r.json() : {}).then(c => {
        if (c.botUsername) document.getElementById('bot-link').href = 'https://t.me/' + c.botUsername;
      }).catch(() => {});
    })();
  </script>
</body>
</html>
